version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: weather_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  rest-api:
    build: .
    ports:
      - "5001:5001"
    environment:
      - DB_HOST=db
      - DB_NAME=weather_db
      - DB_USER=postgres
      - DB_PASS=password
    depends_on:
      - db