name: Node.js Sampler CI
on: [push]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          
      - name: Install Dependencies
        run: npm install # Even if empty, good practice
        
      - name: Run Unit Tests
        run: node test.js
        
      - name: Report Success
        run: echo "Unit tests passed. Pipeline secure."
