name: WeatherStation CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Setup Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: install python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flask pytest requests

      # 2. Run unit tests
      - name: Run Python Unit Tests
        run: |
          python -m pytest tests/

      # 3. Setup Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # 4. Verify sampler syntax
      - name: Check Sampler Syntax
        run: node -c sampler.js
