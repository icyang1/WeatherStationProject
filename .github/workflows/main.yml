name: Simple CI
on: [push]

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build and Run
        run: |
          javac WeatherSensor.java
          timeout 5s java WeatherSensor || true
